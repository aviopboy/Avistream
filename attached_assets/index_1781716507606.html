<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
<title>AviStream</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060608;--sf:#0e0e14;--sf2:#16161f;--sf3:#1e1e2a;
  --bd:#252535;--bd2:#30304a;
  --ac:#ff6b35;--ac2:#ff8c5a;--ac3:rgba(255,107,53,.12);
  --tx:#f0f0f8;--mu:#7070a0;--mu2:#a0a0c0;
  --gn:#00d26a;--bl:#4d9fff;--hi:#ff3366;--jp:#9b5de5;
  --fo:'Outfit',sans-serif;--fm:'Space Mono',monospace;
  --r6:6px;--r8:8px;--r12:12px;
  --sh:0 4px 24px rgba(0,0,0,.6);
}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:var(--fo);font-size:14px;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--sf)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--ac)}
a{text-decoration:none;color:inherit}
img{max-width:100%}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:500;height:60px;
  display:flex;align-items:center;gap:12px;padding:0 20px;
  background:rgba(6,6,8,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd)}
.logo{font-size:22px;font-weight:800;color:var(--ac);cursor:pointer;
  letter-spacing:-0.5px;flex-shrink:0;user-select:none}
.logo span{color:var(--tx)}
.nav-search{flex:1;max-width:440px;position:relative}
.nav-search input{width:100%;padding:9px 14px 9px 38px;
  background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r8);
  color:var(--tx);font-family:var(--fo);font-size:13px;outline:none;transition:border-color .2s}
.nav-search input:focus{border-color:var(--ac)}
.nav-search input::placeholder{color:var(--mu)}
.nav-sico{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--mu);pointer-events:none;font-size:15px}
.sdrop{position:absolute;top:calc(100%+8px);left:0;right:0;
  background:var(--sf);border:1px solid var(--bd);border-radius:var(--r12);
  overflow:hidden;z-index:600;display:none;max-height:420px;overflow-y:auto;
  box-shadow:var(--sh)}
.sdrop.open{display:block}
.si-item{display:flex;gap:12px;padding:10px 14px;cursor:pointer;
  transition:background .15s;align-items:center;border-bottom:1px solid var(--bd)}
.si-item:last-child{border-bottom:none}
.si-item:hover{background:var(--sf2)}
.si-img{width:40px;height:56px;object-fit:cover;border-radius:5px;flex-shrink:0;background:var(--sf2)}
.si-name{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:4px}
.si-meta{color:var(--mu);font-size:11px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.nav-links{display:flex;gap:2px;margin-left:auto}
.nl{padding:7px 14px;border-radius:var(--r6);color:var(--mu);font-size:13px;font-weight:500;
  cursor:pointer;border:none;background:none;font-family:var(--fo);transition:all .2s;white-space:nowrap}
.nl:hover{color:var(--tx);background:var(--sf2)}
.nl.act{color:var(--ac);background:var(--ac3)}
.nav-mob-menu{display:none;background:none;border:none;color:var(--mu);font-size:22px;cursor:pointer;padding:4px;margin-left:auto}
.mob-nav{display:none;position:fixed;top:60px;left:0;right:0;z-index:490;
  background:var(--sf);border-bottom:1px solid var(--bd);padding:12px;flex-direction:column;gap:4px}
.mob-nav.open{display:flex}
.mob-nl{padding:12px 16px;border-radius:var(--r6);color:var(--mu);font-size:14px;font-weight:500;
  cursor:pointer;transition:all .2s}
.mob-nl:hover,.mob-nl.act{color:var(--ac);background:var(--ac3)}

/* ── UTILS ── */
.bdg{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}
.b-ac{background:var(--ac);color:#fff}
.b-gn{background:var(--gn);color:#000}
.b-bl{background:var(--bl);color:#fff}
.b-hi{background:var(--hi);color:#fff}
.b-jp{background:var(--jp);color:#fff}
.b-sc{background:rgba(255,200,50,.15);color:#ffd700;border:1px solid rgba(255,200,50,.3)}
.b-xt{background:var(--sf3);color:var(--mu2);border:1px solid var(--bd)}
.btn{padding:11px 24px;border-radius:var(--r8);font-size:13px;font-weight:600;cursor:pointer;
  transition:all .2s;border:none;font-family:var(--fo);display:inline-flex;align-items:center;gap:8px}
.btn-p{background:var(--ac);color:#fff}
.btn-p:hover{background:var(--ac2);transform:translateY(-1px)}
.btn-g{background:rgba(255,255,255,.08);color:var(--tx);border:1px solid rgba(255,255,255,.15)}
.btn-g:hover{background:rgba(255,255,255,.14)}
.btn-sm{padding:8px 16px;font-size:12px}

/* ── SECTION HEADERS ── */
main{padding-top:60px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.st{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px}
.st::before{content:'';display:block;width:3px;height:20px;background:var(--ac);border-radius:2px}
.sm{color:var(--ac);font-size:12px;cursor:pointer;font-weight:600}
.sm:hover{text-decoration:underline}

/* ── HERO ── */
.hero{position:relative;height:520px;overflow:hidden}
@media(max-width:640px){.hero{height:420px}}
.hslides{display:flex;height:100%;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.hslide{min-width:100%;height:100%;position:relative;flex-shrink:0}
.hbg{width:100%;height:100%;object-fit:cover;object-position:center 20%}
.hov{position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(6,6,8,.98) 0%,rgba(6,6,8,.6) 50%,transparent 100%)}
.hov2{position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg) 0%,transparent 50%)}
.hc{position:absolute;left:40px;bottom:60px;max-width:500px}
@media(max-width:640px){.hc{left:16px;bottom:32px;max-width:calc(100% - 32px)}}
.hspot{font-family:var(--fm);font-size:10px;color:var(--ac);letter-spacing:3px;
  margin-bottom:10px;text-transform:uppercase}
.htitle{font-size:clamp(24px,4vw,48px);font-weight:800;line-height:1.05;
  letter-spacing:-0.5px;margin-bottom:10px}
.hmeta{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.hdesc{font-size:13px;color:rgba(240,240,248,.7);line-height:1.65;margin-bottom:20px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
@media(max-width:640px){.hdesc{-webkit-line-clamp:2}}
.hbtns{display:flex;gap:10px;flex-wrap:wrap}
.hdots{position:absolute;bottom:24px;right:32px;display:flex;gap:8px}
@media(max-width:640px){.hdots{bottom:16px;right:16px}}
.dot{width:22px;height:3px;border-radius:2px;background:rgba(255,255,255,.2);
  cursor:pointer;transition:all .3s}
.dot.act{width:36px;background:var(--ac)}

/* ── CARDS ── */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
@media(max-width:480px){.cg{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}}
.card{position:relative;border-radius:var(--r8);overflow:hidden;background:var(--sf);
  cursor:pointer;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.6)}
.card:hover .cov{opacity:1}
.cimg{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--sf2);display:block}
.cov{position:absolute;inset:0;
  background:linear-gradient(to top,rgba(6,6,8,.97) 0%,rgba(6,6,8,.1) 55%,transparent 100%);
  opacity:0;transition:opacity .2s;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
.pico{position:absolute;top:50%;left:50%;transform:translate(-50%,-70%);
  width:46px;height:46px;border-radius:50%;background:var(--ac);
  display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}
.cin{padding:10px 10px 8px}
.cname{font-size:12px;font-weight:600;line-height:1.4;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.cmeta{font-size:11px;color:var(--mu);display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.sr{overflow-x:auto;padding-bottom:8px}
.sr::-webkit-scrollbar{height:3px}
.cr{display:flex;gap:10px}
.cr .card{min-width:130px}
@media(max-width:480px){.cr .card{min-width:110px}}

/* ── SIDEBAR LIST ── */
.tlist{display:flex;flex-direction:column;gap:6px}
.ti{display:flex;gap:10px;align-items:center;padding:10px;border-radius:var(--r8);
  background:var(--sf);cursor:pointer;transition:background .2s}
.ti:hover{background:var(--sf2)}
.trk{font-family:var(--fm);font-size:26px;color:var(--bd2);min-width:30px;text-align:center;line-height:1}
.timg{width:42px;height:58px;object-fit:cover;border-radius:5px;flex-shrink:0;background:var(--sf2)}
.tname{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:2px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tsub{font-size:11px;color:var(--mu)}

/* ── GENRE PILLS ── */
.gpills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.pill{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;
  background:var(--sf2);border:1px solid var(--bd);color:var(--mu);transition:all .2s}
.pill:hover,.pill.act{background:var(--ac);border-color:var(--ac);color:#fff}

.seas-pill{padding:8px 16px;border-radius:var(--r8);font-size:12px;font-weight:600;cursor:pointer;
  background:var(--sf);border:1px solid var(--bd);color:var(--mu2);transition:all .2s;
  display:flex;align-items:center;gap:6px}
.seas-pill:hover{border-color:var(--bd2)}
.seas-pill.act{background:var(--ac3);border-color:var(--ac);color:var(--ac)}
.seas-pill .seas-ep-count{font-size:10px;color:var(--mu);font-family:var(--fm)}

/* ── TWO-COL LAYOUT ── */
.page-body{display:grid;grid-template-columns:1fr 280px;gap:0}
.page-main{padding:28px 20px 28px 24px;border-right:1px solid var(--bd)}
.page-side{padding:28px 20px}
@media(max-width:900px){
  .page-body{grid-template-columns:1fr}
  .page-main{border-right:none;padding:20px 16px}
  .page-side{padding:0 16px 24px;border-top:1px solid var(--bd)}
}

/* ════ SERIES PAGE ════ */
#series-page{display:none}
.series-banner-wrap{position:relative;height:320px;overflow:hidden}
@media(max-width:640px){.series-banner-wrap{height:200px}}
.series-banner{width:100%;height:100%;object-fit:cover;object-position:center 20%}
.series-banner-ov{position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(6,6,8,.3) 0%,rgba(6,6,8,.9) 70%,var(--bg) 100%)}

.series-body{display:flex;gap:24px;margin-top:-100px;position:relative;z-index:2;padding:0 24px}
@media(max-width:640px){
  .series-body{flex-direction:column;align-items:center;margin-top:-80px;padding:0 16px;gap:16px}
}
.series-poster{width:180px;aspect-ratio:2/3;object-fit:cover;border-radius:var(--r12);
  box-shadow:0 16px 48px rgba(0,0,0,.7);flex-shrink:0;background:var(--sf2)}
@media(max-width:640px){.series-poster{width:140px}}
.series-info{padding-top:110px;flex:1;min-width:0}
@media(max-width:640px){.series-info{padding-top:0;text-align:center}}
.series-title{font-size:clamp(20px,3vw,36px);font-weight:800;line-height:1.1;
  letter-spacing:-.5px;margin-bottom:6px}
.series-jp{color:var(--mu);font-size:13px;margin-bottom:12px}
.series-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
@media(max-width:640px){.series-badges{justify-content:center}}
.series-desc{font-size:13px;color:rgba(240,240,248,.75);line-height:1.7;
  margin-bottom:16px;max-width:680px}
.series-desc.cl{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.series-actions{display:flex;gap:10px;flex-wrap:wrap}
@media(max-width:640px){.series-actions{justify-content:center}}

/* Series tabs */
.series-tabs{display:flex;gap:0;border-bottom:1px solid var(--bd);
  margin:24px 24px 0;overflow-x:auto;position:sticky;top:60px;z-index:10;background:var(--bg)}
@media(max-width:640px){.series-tabs{margin:16px 0 0}}
.stab{padding:13px 22px;font-size:13px;font-weight:600;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--mu);
  transition:all .2s;font-family:var(--fo);white-space:nowrap;flex-shrink:0}
.stab:hover{color:var(--tx)}
.stab.act{color:var(--ac);border-bottom-color:var(--ac)}
.s-panel{padding:24px;display:none}
@media(max-width:640px){.s-panel{padding:16px}}
.s-panel.act{display:block}

/* Episode grid */
.ep-controls{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.ep-sel{padding:8px 12px;background:var(--sf2);border:1px solid var(--bd);
  border-radius:var(--r8);color:var(--tx);font-family:var(--fo);font-size:13px;outline:none;cursor:pointer}
.ep-sel:focus{border-color:var(--ac)}
.ep-finp{padding:8px 12px;background:var(--sf2);border:1px solid var(--bd);
  border-radius:var(--r8);color:var(--tx);font-family:var(--fo);font-size:13px;
  outline:none;width:160px}
@media(max-width:480px){.ep-finp{width:100%}}
.ep-finp:focus{border-color:var(--ac)}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
@media(max-width:640px){.ep-grid{grid-template-columns:1fr}}
.ep-card{display:flex;gap:12px;padding:12px;background:var(--sf);border-radius:var(--r8);
  cursor:pointer;transition:all .2s;border:1px solid transparent;align-items:flex-start}
.ep-card:hover{background:var(--sf2);border-color:var(--bd)}
.ep-card.act{border-color:var(--ac);background:var(--ac3)}
.ep-thumb-wrap{position:relative;flex-shrink:0;width:112px}
.ep-thumb{width:112px;height:63px;object-fit:cover;border-radius:5px;
  background:var(--sf2);display:block}
.ep-num-bdg{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,.85);
  color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;font-family:var(--fm)}
.ep-play-ico{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.5);opacity:0;transition:opacity .2s;border-radius:5px;color:#fff;font-size:22px}
.ep-thumb-wrap:hover .ep-play-ico{opacity:1}
.ep-info{flex:1;min-width:0}
.ep-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:4px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ep-desc{font-size:12px;color:var(--mu);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ep-tags{margin-top:6px;display:flex;gap:5px;flex-wrap:wrap}

/* Audio panel */
.aud-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:24px}
.aud-card{padding:16px;background:var(--sf);border-radius:var(--r8);border:2px solid var(--bd);
  cursor:pointer;transition:all .2s}
.aud-card:hover{border-color:var(--bd2)}
.aud-card.sel{border-color:var(--ac);background:var(--ac3)}
.aud-flag{font-size:28px;margin-bottom:8px}
.aud-lang{font-size:14px;font-weight:700;margin-bottom:4px}
.aud-info{font-size:12px;color:var(--mu);line-height:1.5}
.sub-pills{display:flex;gap:8px;flex-wrap:wrap}

/* Details panel */
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 24px}
@media(max-width:640px){.det-grid{grid-template-columns:1fr}}
.det-item{padding:12px;background:var(--sf);border-radius:var(--r8)}
.det-lbl{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.det-val{font-size:13px;color:var(--tx);line-height:1.6}
.char-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
.char-it{display:flex;flex-direction:column;align-items:center;gap:6px;width:68px}
.char-img{width:60px;height:60px;border-radius:50%;object-fit:cover;background:var(--sf2)}
.char-nm{font-size:10px;text-align:center;color:var(--mu);line-height:1.3}

/* ════ WATCH PAGE ════ */
#watch-page{display:none}
.watch-grid{display:grid;grid-template-columns:1fr 320px;min-height:calc(100vh - 60px)}
@media(max-width:900px){.watch-grid{grid-template-columns:1fr}}
.watch-main{display:flex;flex-direction:column}
.watch-side{background:var(--sf);border-left:1px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden}
@media(max-width:900px){
  .watch-side{max-height:320px;border-left:none;border-top:1px solid var(--bd)}
}

/* Player */
.player-box{position:relative;width:100%;aspect-ratio:16/9;background:#000}
.player-box iframe,.player-box video{position:absolute;inset:0;width:100%;height:100%;border:none}
#hlsvid{display:block}
.vload{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.9);flex-direction:column;gap:14px;z-index:5}
.spin{width:44px;height:44px;border:3px solid var(--bd);border-top-color:var(--ac);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Watch controls */
.wctrl{padding:14px 20px;background:var(--sf);border-bottom:1px solid var(--bd)}
@media(max-width:640px){.wctrl{padding:12px}}
.wtitle{font-size:18px;font-weight:700;line-height:1.2;margin-bottom:4px}
.weptitle{font-size:13px;color:var(--mu);margin-bottom:12px}
.wrow{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.wlbl{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:1.5px;
  text-transform:uppercase;flex-shrink:0;align-self:center;margin-right:2px}
.wtab{padding:8px 14px;border-radius:var(--r6);font-size:12px;font-weight:600;cursor:pointer;
  border:1px solid var(--bd);background:var(--sf2);color:var(--mu);
  transition:all .2s;font-family:var(--fo);white-space:nowrap}
.wtab:hover{border-color:var(--ac);color:var(--ac)}
.wtab.on-sub{background:var(--jp)!important;border-color:var(--jp)!important;color:#fff!important}
.wtab.on-dub{background:var(--bl)!important;border-color:var(--bl)!important;color:#fff!important}
.wtab.on-hindi{background:var(--hi)!important;border-color:var(--hi)!important;color:#fff!important}
.srvtab{padding:6px 12px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;
  border:1px solid var(--bd);background:var(--sf2);color:var(--mu);
  transition:all .2s;font-family:var(--fo)}
.srvtab:hover{border-color:var(--ac);color:var(--ac)}
.srvtab.act{background:var(--ac);border-color:var(--ac);color:#fff}
@media(max-width:480px){
  .wrow{gap:8px}
  .wlbl{width:100%;margin-right:0;margin-bottom:2px}
  .wtab{flex:1 1 auto;text-align:center;padding:9px 10px}
  .srvtab{flex:0 1 auto}
}

/* Watch sidebar */
.wside-hd{padding:12px 16px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.wside-title{font-size:13px;font-weight:700}
.wside-search{padding:10px 12px;border-bottom:1px solid var(--bd);flex-shrink:0}
.wside-search input{width:100%;padding:7px 12px;background:var(--sf2);
  border:1px solid var(--bd);border-radius:5px;color:var(--tx);
  font-family:var(--fo);font-size:12px;outline:none}
.wside-search input:focus{border-color:var(--ac)}
.wside-eps{overflow-y:auto;flex:1}
.sep{display:flex;gap:10px;padding:10px 12px;cursor:pointer;
  transition:background .15s;border-bottom:1px solid var(--bd);align-items:center}
.sep:hover{background:var(--sf2)}
.sep.act{background:var(--ac3);border-left:3px solid var(--ac)}
.sep-img{width:76px;height:44px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--sf2)}
.sep-num{font-family:var(--fm);font-size:10px;color:var(--mu);margin-bottom:2px}
.sep-name{font-size:12px;font-weight:500;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── SCHEDULE ── */
.day-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.dtab{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;
  border:1px solid var(--bd);background:var(--sf);color:var(--mu);transition:all .2s}
.dtab.act{background:var(--ac);border-color:var(--ac);color:#fff}
.srow{display:flex;gap:14px;align-items:center;padding:12px 0;
  border-bottom:1px solid var(--bd);cursor:pointer}
.srow:hover .sname{color:var(--ac)}
.stime{font-family:var(--fm);font-size:12px;color:var(--ac);min-width:48px;flex-shrink:0}
.sname{font-size:13px;font-weight:600;transition:color .2s}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--sf2);border:1px solid var(--bd);
  padding:10px 20px;border-radius:var(--r8);font-size:13px;z-index:9999;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}

/* ── LOADING SKELETON ── */
.skel{background:linear-gradient(90deg,var(--sf) 25%,var(--sf2) 50%,var(--sf) 75%);
  background-size:200% 100%;animation:shim 1.5s infinite;border-radius:var(--r6)}
@keyframes shim{to{background-position:-200% 0}}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo" onclick="go('home')">Avi<span>Stream</span></div>
  <div class="nav-search">
    <span class="nav-sico">⌕</span>
    <input id="sinp" type="search" placeholder="Search anime..." autocomplete="off"/>
    <div class="sdrop" id="sdrop"></div>
  </div>
  <div class="nav-links" id="nav-links">
    <button class="nl act" id="nl-home" onclick="go('home')">Home</button>
    <button class="nl" id="nl-genre" onclick="loadGenre('Action')">Browse</button>
    <button class="nl" id="nl-sched" onclick="loadSched()">Schedule</button>
  </div>
  <button class="nav-mob-menu" id="mob-btn" onclick="toggleMobMenu()">☰</button>
</nav>
<div class="mob-nav" id="mob-nav">

  <div class="mob-nl" onclick="loadGenre('Action');closeMob()">Browse</div>

<!-- HOME -->
<main id="home-page">
  <div class="hero">
    <div class="hslides" id="hslides"></div>
    <div class="hdots" id="hdots"></div>
  </div>
  <div class="page-body">
    <div class="page-main">
      <div class="sh"><div class="st">Trending</div></div>
      <div class="cg" id="trending-grid">
        <div style="color:var(--mu);grid-column:1/-1;padding:20px 0">Loading…</div>
      </div>
      <div style="margin-top:28px">
        <div class="sh"><div class="st">Airing Now</div></div>
        <div class="sr"><div class="cr" id="airing-row"></div></div>
      </div>
      <div style="margin-top:28px">
        <div class="sh"><div class="st">All Time Popular</div></div>
        <div class="sr"><div class="cr" id="popular-row"></div></div>
      </div>
    </div>
    <div class="page-side">
      <div class="sh"><div class="st">Top Picks</div></div>
      <div class="tlist" id="tlist"></div>

</main>

<!-- BROWSE/GENRE -->
<main id="genre-page" style="display:none;padding:24px 20px">
  <div class="gpills" id="gpills"></div>
  <div class="sh"><div class="st" id="gtitle">Action</div></div>

</main>

<!-- SCHEDULE -->
<main id="sched-page" style="display:none;padding:24px 20px">
  <div class="sh"><div class="st">Airing Schedule</div></div>
  <div class="day-tabs" id="day-tabs"></div>

</main>

<!-- SERIES PAGE -->
<main id="series-page">
  <div class="series-banner-wrap">
    <img class="series-banner" id="s-banner" src="" alt=""/>
    <div class="series-banner-ov"></div>
  </div>
  <div class="series-body">
    <img class="series-poster" id="s-poster" src="" alt=""/>
    <div class="series-info">
      <div class="series-title" id="s-title">Loading…</div>
      <div class="series-jp" id="s-jp"></div>
      <div class="series-badges" id="s-badges"></div>
      <div class="series-desc cl" id="s-desc"></div>
      <div style="margin-bottom:16px">
        <span id="desc-tog" style="color:var(--ac);font-size:12px;cursor:pointer"
          onclick="toggleDesc()">Show more ▼</span>
      </div>
      <div class="series-actions">
        <button class="btn btn-p" onclick="startWatching()">▶ Start Watching</button>

  <div class="series-tabs" id="series-tabs">

    <div class="ep-controls">
      <select class="ep-sel" id="ep-range" onchange="filterRange(this.value)">
        <option value="0">All Episodes</option>
      </select>
      <input class="ep-finp" id="ep-finp" placeholder="Search episode…" oninput="filterEps(this.value)"/>
      <span style="color:var(--mu);font-size:12px;margin-left:auto" id="ep-count"></span>
    </div>
    <div class="ep-grid" id="ep-grid"></div>
  </div>
  <div class="s-panel" id="tab-audio">

    <div class="sh" style="margin-bottom:14px"><div class="st">Subtitles</div></div>

  <div class="s-panel" id="tab-details">
    <div class="det-grid" id="det-grid"></div>

</main>

<!-- WATCH PAGE -->
<main id="watch-page">
  <div class="watch-grid">
    <div class="watch-main">
      <div class="player-box" id="pbox">
        <video id="hlsvid" playsinline controls></video>
        <div class="vload" id="vload">
          <div class="spin"></div>
          <span style="color:var(--mu);font-size:13px">Loading stream…</span>
        </div>
      </div>
      <div class="wctrl">
        <div class="wtitle" id="w-title"></div>
        <div class="weptitle" id="w-eptitle"></div>

          <span class="wlbl">Audio</span>
          <button class="wtab on-sub" id="aud-sub" onclick="setAud('sub')">🇯🇵 SUB</button>
          <button class="wtab" id="aud-dub" onclick="setAud('dub')">🇺🇸 DUB</button>
          <button class="wtab" id="aud-hindi" style="display:none" onclick="setAud('hindi')">🇮🇳 HINDI</button>
        </div>

          <span class="wlbl">Server</span>

        <input id="wside-inp" placeholder="Filter episodes…" oninput="filterSide(this.value)"/>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const $ = id => document.getElementById(id);
const HINDI = new Set([20,1735,21,813,6033,269,11757,16498,99147,113415,108725,21459,57,232,11061,5114,101922,21519]);
// AniList ID -> AnimeSalt slug (used to fetch real Hindi dub data)
const HINDI_SLUGS = {
  20:'naruto',1735:'naruto-shippuden',21:'one-piece',813:'dragon-ball-z',
  6033:'dragon-ball-super',269:'bleach',11757:'sword-art-online',
  16498:'attack-on-titan',99147:'demon-slayer-kimetsu-no-yaiba',
  113415:'jujutsu-kaisen-tv',108725:'black-clover-tv',21459:'my-hero-academia',
  57:'dragon-ball',232:'fairy-tail',11061:'hunter-x-hunter-2011',
  5114:'fullmetal-alchemist-brotherhood',101922:'solo-leveling',21519:'pokemon'
};
let hindiEpisodeCache=[]; // episode list fetched from AnimeSalt for current series

let heroIdx=0,heroData=[],heroTimer=null;
let curSeriesId=null,curMeta={},curEpList=[],sideEps=[];
let curSeasons=[],activeSeasonId=null;
let curAud='sub',curEpNum=1,hlsInst=null;

// ── UTILS ──
const ttl=m=>m?.title?.english||m?.title?.romaji||'';
const img=m=>m?.coverImage?.extraLarge||m?.coverImage?.large||'';
const sc=m=>m?.averageScore?(m.averageScore/10).toFixed(1):null;
const cap=s=>s?s[0].toUpperCase()+s.slice(1):'';
function toast(m,d=3000){const t=$('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),d)}
function toggleMobMenu(){$('mob-nav').classList.toggle('open')}
function closeMob(){$('mob-nav').classList.remove('open')}

function go(name){
  document.querySelectorAll('main').forEach(m=>m.style.display='none');
  $(name+'-page').style.display='block';
  document.querySelectorAll('.nl').forEach(l=>l.classList.remove('act'));
  document.querySelectorAll('.mob-nl').forEach(l=>l.classList.remove('act'));
  const map={home:'nl-home',genre:'nl-genre',sched:'nl-sched'};
  if(map[name])$(map[name])?.classList.add('act');
  window.scrollTo(0,0);
  closeMob();
}

// ── HOME ──────────────────────────────────────────────────────────────────────
async function loadHome(){
  try{
    const r=await fetch('/api/home');
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    buildHero(d.trending||[]);
    buildGrid('trending-grid',d.trending||[]);
    buildRow('airing-row',d.airing||[]);
    buildRow('popular-row',d.popular||[]);
    buildSide(d.popular||[]);
  }catch(e){
    $('trending-grid').innerHTML=`<div style="color:var(--hi);grid-column:1/-1">
      ❌ ${e.message}<br><small style="color:var(--mu);margin-top:8px;display:block">
      Make sure the server is running: <code style="background:var(--sf2);padding:2px 8px;border-radius:4px">node server.mjs</code></small></div>`;
  }
}

function buildHero(items){
  heroData=items.filter(m=>m.bannerImage||img(m)).slice(0,6);
  const slides=$('hslides'),dots=$('hdots');
  slides.innerHTML='';dots.innerHTML='';
  heroData.forEach((m,i)=>{
    const bg=m.bannerImage||img(m),t=ttl(m),s=sc(m),hasH=HINDI.has(m.id);
    slides.innerHTML+=`<div class="hslide">
      <img class="hbg" src="${bg}" loading="${i===0?'eager':'lazy'}" onerror="this.src='${img(m)}'"/>
      <div class="hov"></div><div class="hov2"></div>
      <div class="hc">
        <div class="hspot">★ trending now</div>
        <div class="htitle">${t}</div>
        <div class="hmeta">
          <span class="bdg b-ac">${m.format||'TV'}</span>
          ${s?`<span class="bdg b-sc">⭐ ${s}</span>`:''}
          <span class="bdg b-jp">SUB</span>
          <span class="bdg b-bl">DUB</span>
          ${hasH?'<span class="bdg b-hi">🇮🇳 हिंदी</span>':''}
          ${m.episodes?`<span class="bdg b-xt">${m.episodes} eps</span>`:''}
        </div>
        <div class="hdesc">${(m.description||'').replace(/<[^>]*>/g,'')}</div>
        <div class="hbtns">
          <button class="btn btn-p" onclick="goSeries(${m.id})">▶ Watch Now</button>
          <button class="btn btn-g" onclick="goSeries(${m.id})">ℹ Series Info</button>
        </div>
      </div>
    </div>`;
    const d=document.createElement('div');
    d.className='dot'+(i===0?' act':'');
    d.onclick=()=>goSlide(i);
    dots.appendChild(d);
  });
  clearInterval(heroTimer);
  heroTimer=setInterval(()=>goSlide((heroIdx+1)%heroData.length),5500);
}

function goSlide(i){
  heroIdx=i;
  $('hslides').style.transform=`translateX(-${i*100}%)`;
  document.querySelectorAll('.dot').forEach((d,j)=>d.classList.toggle('act',j===i));
}

function buildGrid(id,items){
  $(id).innerHTML=items.map(card).join('')||'<div style="color:var(--mu);grid-column:1/-1">No data.</div>';
}
function buildRow(id,items){$(id).innerHTML=items.slice(0,14).map(card).join('')}
function buildSide(items){
  $('tlist').innerHTML=items.slice(0,10).map((m,i)=>`
    <div class="ti" onclick="goSeries(${m.id})">
      <div class="trk">${String(i+1).padStart(2,'0')}</div>
      <img class="timg" src="${img(m)}" loading="lazy" onerror="this.style.background='var(--sf2)'"/>
      <div style="min-width:0">
        <div class="tname">${ttl(m)}</div>
        <div class="tsub">${m.format||''} ${sc(m)?'· ⭐'+sc(m):''}</div>
      </div>
    </div>`).join('');
}

function card(m){
  const t=ttl(m),s=sc(m),hasH=HINDI.has(m.id);
  return `<div class="card" onclick="goSeries(${m.id})">
    <img class="cimg" src="${img(m)}" alt="${t}" loading="lazy" onerror="this.style.background='var(--sf2)'"/>
    <div class="cov">
      <div class="pico">▶</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        <span class="bdg b-jp" style="font-size:10px;padding:1px 5px">SUB</span>
        <span class="bdg b-bl" style="font-size:10px;padding:1px 5px">DUB</span>
        ${hasH?'<span class="bdg b-hi" style="font-size:10px;padding:1px 5px">हिं</span>':''}
      </div>
    </div>
    <div class="cin">
      <div class="cname">${t}</div>
      <div class="cmeta">
        ${m.format?`<span>${m.format}</span>`:''}
        ${s?`<span>⭐${s}</span>`:''}
        ${m.episodes?`<span>${m.episodes}ep</span>`:''}
      </div>
    </div>
  </div>`;
}

// ════ SERIES PAGE ════════════════════════════════════════════════════════════
async function goSeries(alId){
  curSeriesId=alId;
  hindiEpisodeCache=[]; // invalidate cached Hindi episodes from any previous series
  go('series');
  $('s-title').textContent='Loading…';
  $('s-banner').src='';$('s-poster').src='';
  $('ep-grid').innerHTML='<div style="color:var(--mu);grid-column:1/-1">Loading episodes…</div>';

  try{
    const r=await fetch(`/api/info/${alId}`);
    const m=await r.json();
    curMeta=m;
    const t=ttl(m),s=sc(m),hasH=HINDI.has(m.id);

    $('s-banner').src=m.bannerImage||img(m);
    $('s-poster').src=img(m);
    $('s-title').textContent=t;
    $('s-jp').textContent=m.title?.native||'';
    $('s-desc').textContent=(m.description||'').replace(/<[^>]*>/g,'');

    $('s-badges').innerHTML=`
      <span class="bdg b-ac">${m.format||'TV'}</span>
      ${m.status?`<span class="bdg b-xt">${m.status}</span>`:''}
      ${m.episodes?`<span class="bdg b-xt">${m.episodes} eps</span>`:''}
      ${m.duration?`<span class="bdg b-xt">${m.duration}min/ep</span>`:''}
      ${s?`<span class="bdg b-sc">⭐ ${s}/10</span>`:''}
      ${m.season?`<span class="bdg b-xt">${m.season} ${m.seasonYear||''}</span>`:''}
      <span class="bdg b-jp">🇯🇵 SUB</span>
      <span class="bdg b-bl">🇺🇸 DUB</span>
      ${hasH?'<span class="bdg b-hi">🇮🇳 हिंदी</span>':''}`;

    buildAudio(m,hasH);
    buildDetails(m);
    buildChars(m.characters?.nodes||[]);
    buildRelated(m.relations?.edges||[]);
    activeSeasonId=alId;
    loadSeasons(alId);
    loadEpisodes(m);
  }catch(e){toast('Error: '+e.message)}
}

async function loadSeasons(alId){
  $('season-row').innerHTML='';
  try{
    const r=await fetch(`/api/seasons/${alId}`);
    const d=await r.json();
    curSeasons=d.seasons||[];
    if(curSeasons.length<=1){return} // no point showing a single-season selector
    $('season-row').innerHTML=curSeasons.map((s,i)=>`
      <div class="seas-pill${s.id===activeSeasonId?' act':''}" id="seaspill-${s.id}" onclick="switchSeason(${s.id})">
        <span>Season ${i+1}</span>
        <span class="seas-ep-count">${s.episodes?s.episodes+' ep':''}</span>
      </div>`).join('');
  }catch(e){}
}

async function switchSeason(seasonId){
  if(seasonId===activeSeasonId)return;
  activeSeasonId=seasonId;
  document.querySelectorAll('.seas-pill').forEach(p=>p.classList.remove('act'));
  $('seaspill-'+seasonId)?.classList.add('act');
  // Reload this season's info into the SAME series page (without rebuilding season pills)
  try{
    const r=await fetch(`/api/info/${seasonId}`);
    const m=await r.json();
    curSeriesId=seasonId;
    curMeta=m;
    const t=ttl(m),s=sc(m),hasH=HINDI.has(m.id);
    $('s-banner').src=m.bannerImage||img(m);
    $('s-poster').src=img(m);
    $('s-title').textContent=t;
    $('s-jp').textContent=m.title?.native||'';
    $('s-desc').textContent=(m.description||'').replace(/<[^>]*>/g,'');
    $('s-badges').innerHTML=`
      <span class="bdg b-ac">${m.format||'TV'}</span>
      ${m.status?`<span class="bdg b-xt">${m.status}</span>`:''}
      ${m.episodes?`<span class="bdg b-xt">${m.episodes} eps</span>`:''}
      ${s?`<span class="bdg b-sc">⭐ ${s}/10</span>`:''}
      <span class="bdg b-jp">🇯🇵 SUB</span>
      <span class="bdg b-bl">🇺🇸 DUB</span>
      ${hasH?'<span class="bdg b-hi">🇮🇳 हिंदी</span>':''}`;
    buildAudio(m,hasH);
    buildDetails(m);
    buildChars(m.characters?.nodes||[]);
    buildRelated(m.relations?.edges||[]);
    loadEpisodes(m);
  }catch(e){toast('Could not load season: '+e.message)}
}

function toggleDesc(){
  const el=$('s-desc'),tog=$('desc-tog');
  el.classList.toggle('cl');
  tog.textContent=el.classList.contains('cl')?'Show more ▼':'Show less ▲';
}

function switchTab(name,el){
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('act'));
  document.querySelectorAll('.s-panel').forEach(p=>p.classList.remove('act'));
  el.classList.add('act');
  $('tab-'+name).classList.add('act');
}

async function loadEpisodes(m){
  const total=m.episodes||24;
  // First build synthetic list fast
  curEpList=Array.from({length:total},(_,i)=>({
    num:i+1, title:`Episode ${i+1}`, img:'', filler:false
  }));
  renderEpGrid(curEpList);
  buildRangeSelect(curEpList);

  // Then fetch real episode names from Jikan (MAL)
  if(!m.idMal) return;
  try{
    const r=await fetch(`/api/episodes/${m.idMal}`);
    const d=await r.json();
    if(d.episodes?.length){
      curEpList=d.episodes.map(ep=>({
        num:ep.episode,
        title:ep.title||`Episode ${ep.episode}`,
        titleJp:ep.title_japanese||'',
        aired:ep.aired||'',
        filler:ep.filler||false,
        recap:ep.recap||false,
        img:'',
      }));
      renderEpGrid(curEpList);
      buildRangeSelect(curEpList);
    }
  }catch(e){}
}

function buildRangeSelect(eps){
  const sel=$('ep-range');
  sel.innerHTML='<option value="0">All Episodes</option>';
  if(eps.length>24){
    for(let i=0;i<eps.length;i+=24){
      const end=Math.min(i+24,eps.length);
      const o=document.createElement('option');
      o.value=i+1;
      o.textContent=`Episodes ${i+1}–${end}`;
      sel.appendChild(o);
    }
  }
  $('ep-count').textContent=`${eps.length} eps`;
}

function filterRange(v){
  const n=parseInt(v);
  if(!n){renderEpGrid(curEpList);return}
  renderEpGrid(curEpList.filter(e=>e.num>=n&&e.num<n+24));
}

function filterEps(q){
  if(!q){renderEpGrid(curEpList);return}
  renderEpGrid(curEpList.filter(e=>
    String(e.num).includes(q)||(e.title||'').toLowerCase().includes(q.toLowerCase())));
}

function renderEpGrid(eps){
  $('ep-grid').innerHTML=eps.map(ep=>`
    <div class="ep-card" onclick="watchEp(${ep.num},'${(ep.title||'').replace(/'/g,"\\'")}')">
      <div class="ep-thumb-wrap">
        <div class="ep-thumb skel"></div>
        <div class="ep-num-bdg">EP ${ep.num}</div>
        <div class="ep-play-ico">▶</div>
      </div>
      <div class="ep-info">
        <div class="ep-title">Ep ${ep.num}: ${ep.title||'Episode '+ep.num}</div>
        ${ep.aired?`<div class="ep-desc">Aired: ${ep.aired.slice(0,10)}</div>`:''}
        <div class="ep-tags">
          ${ep.filler?'<span class="bdg b-xt" style="font-size:10px">Filler</span>':''}
          ${ep.recap?'<span class="bdg b-xt" style="font-size:10px">Recap</span>':''}
          <span class="bdg b-jp" style="font-size:10px;padding:1px 5px">SUB</span>
          <span class="bdg b-bl" style="font-size:10px;padding:1px 5px">DUB</span>
          ${HINDI.has(curSeriesId)?'<span class="bdg b-hi" style="font-size:10px;padding:1px 5px">हिं</span>':''}
        </div>
      </div>
    </div>`).join('')||'<div style="color:var(--mu)">No episodes found.</div>';
}

function buildAudio(m,hasH){
  const auds=[
    {flag:'🇯🇵',lang:'Japanese',color:'var(--jp)',info:'Original audio',avail:'All episodes'},
    {flag:'🇺🇸',lang:'English Dub',color:'var(--bl)',info:'English dubbed',avail:m.episodes?`${m.episodes} eps`:'Available'},
  ];
  if(hasH)auds.push({flag:'🇮🇳',lang:'Hindi Dub',color:'var(--hi)',info:'Sony YAY broadcast',avail:'Partial'});
  $('aud-grid').innerHTML=auds.map((a,i)=>`
    <div class="aud-card${i===0?' sel':''}" onclick="document.querySelectorAll('.aud-card').forEach(c=>c.classList.remove('sel'));this.classList.add('sel')">
      <div class="aud-flag">${a.flag}</div>
      <div class="aud-lang" style="color:${a.color}">${a.lang}</div>
      <div class="aud-info">${a.info}</div>
      <div class="aud-info" style="color:var(--ac);margin-top:4px">${a.avail}</div>
    </div>`).join('');
  $('sub-pills').innerHTML=['English','Arabic','Spanish','French','Portuguese','German','Italian','Russian','Turkish','Indonesian']
    .map(s=>`<span class="bdg b-xt" style="font-size:12px;padding:5px 12px">${s}</span>`).join('');
}

function buildDetails(m){
  const rows=[
    ['Format',m.format||'—'],['Status',m.status||'—'],
    ['Episodes',m.episodes||'—'],['Duration',m.duration?m.duration+' min/ep':'—'],
    ['Season',m.season?`${m.season} ${m.seasonYear||''}`:'—'],
    ['Studio',m.studios?.nodes?.[0]?.name||'—'],
    ['Score',sc(m)||'—'],['Popularity',m.popularity?.toLocaleString()||'—'],
    ['Genres',(m.genres||[]).join(', ')||'—'],
    ['Tags',(m.tags||[]).filter(t=>!t.isMediaSpoiler).slice(0,6).map(t=>t.name).join(', ')||'—'],
  ];
  $('det-grid').innerHTML=rows.map(([l,v])=>`
    <div class="det-item"><div class="det-lbl">${l}</div><div class="det-val">${v}</div></div>`).join('');
}

function buildChars(chars){
  $('char-row').innerHTML=chars.map(c=>`
    <div class="char-it">
      <img class="char-img" src="${c.image?.medium||''}" loading="lazy" onerror="this.style.background='var(--sf2)'"/>
      <div class="char-nm">${c.name?.full||''}</div>
    </div>`).join('');
}

function buildRelated(edges){
  const rels=edges.filter(e=>e.node.type==='ANIME'&&['SEQUEL','PREQUEL','SIDE_STORY','PARENT','ALTERNATIVE'].includes(e.relationType));
  $('rel-row').innerHTML=rels.map(e=>`
    <div class="card" style="min-width:130px" onclick="goSeries(${e.node.id})">
      <img class="cimg" src="${e.node.coverImage?.medium||''}" loading="lazy"/>
      <div class="cov"><div class="pico">▶</div></div>
      <div class="cin">
        <div class="cname">${e.node.title?.romaji||''}</div>
        <div class="cmeta">${e.relationType}</div>
      </div>
    </div>`).join('')||'<div style="color:var(--mu)">No related anime.</div>';
}

function startWatching(){
  if(curEpList.length)watchEp(curEpList[0].num,curEpList[0].title);
}

// ════ WATCH PAGE ═════════════════════════════════════════════════════════════
function watchEp(epNum, epTitle){
  go('watch');
  curEpNum=epNum;
  curAud='sub';

  $('w-title').textContent=ttl(curMeta)||'';
  $('w-eptitle').textContent=`Episode ${epNum}: ${epTitle||''}`;
  $('wside-title').textContent=ttl(curMeta)||'Episodes';

  const hasH=HINDI.has(curSeriesId);
  $('aud-hindi').style.display=hasH?'':'none';
  updateAudTabs();

  // Build sidebar
  sideEps=curEpList;
  renderSide(curEpList,epNum);

  // Load stream
  showLoad(true);
  clearPlayer();
  loadStream(epNum,epTitle,'sub');
}

function renderSide(eps,activeNum){
  $('wside-eps').innerHTML=eps.map(ep=>`
    <div class="sep${ep.num===activeNum?' act':''}" id="sep-${ep.num}"
      onclick="watchEp(${ep.num},'${(ep.title||'').replace(/'/g,"\\'")}')">
      <div class="sep-img skel"></div>
      <div>
        <div class="sep-num">EP ${ep.num}</div>
        <div class="sep-name">${ep.title||'Episode '+ep.num}</div>
      </div>
    </div>`).join('');
  setTimeout(()=>{const el=$('sep-'+activeNum);if(el)el.scrollIntoView({block:'nearest'})},80);
}

function filterSide(q){
  if(!q){renderSide(sideEps,curEpNum);return}
  renderSide(sideEps.filter(e=>String(e.num).includes(q)||(e.title||'').toLowerCase().includes(q.toLowerCase())),0);
}

function updateAudTabs(){
  ['sub','dub','hindi'].forEach(t=>{
    const el=$('aud-'+t);if(!el)return;
    el.classList.remove('on-sub','on-dub','on-hindi');
    if(t===curAud)el.classList.add('on-'+t);
  });
}

function setAud(type){curAud=type;updateAudTabs();loadStream(curEpNum,null,type)}

let loadToken=0; // increments per load to invalidate stale timeouts/onloads

function showLoad(v){$('vload').style.display=v?'flex':'none'}

function clearPlayer(){
  if(hlsInst){hlsInst.destroy();hlsInst=null}
  const f=$('pbox').querySelector('iframe');if(f)f.remove();
  $('hlsvid').style.display='block';$('hlsvid').src='';
}

// ── STREAM LOADING ─────────────────────────────────────────────────────────────
function loadStream(epNum, epTitle, audio){
  showLoad(true);clearPlayer();

  if(audio==='hindi'){
    loadHindi(epNum);return;
  }

  // TryEmbed — confirmed working, AniList IDs, SUB/DUB
  const audPath=audio==='dub'?'dub':'sub';
  const src=`https://tryembed.us.cc/embed/anime/${curSeriesId}/${epNum}/${audPath}`;

  buildSrvBtns([
    {label:'TryEmbed',src},
    {label:'VidPlus',src:`https://player.vidplus.to/embed/anime/${curSeriesId}/${epNum}?dub=${audio==='dub'}`},
    {label:'AniEmbed',src:`https://animepahe.ru/embed/${curSeriesId}/${epNum}`},
  ]);
  loadFrame(src);
}

async function loadHindi(epNum){
  showLoad(true);
  clearPlayer();
  const animeTitle=ttl(curMeta)||'this anime';
  const slug=HINDI_SLUGS[curSeriesId];

  if(!slug){
    showHindiUnavailable(animeTitle,'not in our known title list yet');
    return;
  }

  try{
    // Fetch full episode list from AnimeSalt if we haven't already for this series
    if(!hindiEpisodeCache.length || hindiEpisodeCache._slug!==slug){
      const r=await fetch(`/api/hindi/anime/${slug}`);
      const d=await r.json();
      if(!d.success || !d.episodes?.length) throw new Error('No episodes returned');
      hindiEpisodeCache=d.episodes;
      hindiEpisodeCache._slug=slug;
    }

    // Match by overall episode number (AnimeSalt numbers continuously across seasons)
    const match=hindiEpisodeCache.find(e=>String(e.number)===String(epNum));
    if(!match){
      showHindiUnavailable(animeTitle,`episode ${epNum} not found on AnimeSalt`);
      return;
    }

    const epRes=await fetch(`/api/hindi/episode/${match.id}`);
    const epData=await epRes.json();
    if(!epData.success || !epData.data?.video_player) throw new Error('No player URL returned');

    buildSrvBtns([
      {label:'AnimeSalt 🇮🇳',src:epData.data.video_player},
    ], {label:'Open full site ↗', onClick:()=>window.open(epData.data.source||`https://animesalt.ac/series/${slug}/`,'_blank')});

    loadFrame(epData.data.video_player);
  }catch(e){
    showHindiUnavailable(animeTitle, e.message);
  }
}

function showHindiUnavailable(animeTitle, reason){
  showLoad(false);
  clearPlayer();
  $('hlsvid').style.display='none';
  $('srv-row').innerHTML='<span class="wlbl">Server</span><span style="color:var(--mu);font-size:12px">Unavailable</span>';
  const pbox=$('pbox');
  pbox.querySelectorAll(':scope > *:not(#hlsvid):not(#vload)').forEach(el=>el.remove());
  $('vload').innerHTML=`
    <div style="font-size:40px">🇮🇳</div>
    <div style="text-align:center;padding:0 24px">
      <div style="font-weight:700;margin-bottom:6px">Hindi dub not available</div>
      <div style="color:var(--mu);font-size:12px;margin-bottom:14px;max-width:320px">${reason}</div>
      <button class="btn btn-p" onclick="window.open('https://animesalt.ac/?s=${encodeURIComponent(animeTitle)}','_blank')">
        Search AnimeSalt directly ↗
      </button>
    </div>`;
  $('vload').style.display='flex';
}

function buildSrvBtns(srvs, extraBtn){
  const row=$('srv-row');
  row.innerHTML='<span class="wlbl">Server</span>';
  srvs.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='srvtab'+(i===0?' act':'');
    b.textContent=s.label;
    b.onclick=()=>{
      document.querySelectorAll('.srvtab').forEach((x,j)=>x.classList.toggle('act',j===i));
      loadFrame(s.src);
    };
    row.appendChild(b);
  });
  if(extraBtn){
    const eb=document.createElement('button');
    eb.className='srvtab';
    eb.style.marginLeft='auto';
    eb.textContent=extraBtn.label;
    eb.onclick=extraBtn.onClick;
    row.appendChild(eb);
  }
}

function loadFrame(src){
  const myToken=++loadToken; // invalidate any in-flight load from a previous call
  clearPlayer();
  $('hlsvid').style.display='none';
  const f=document.createElement('iframe');
  f.src=src;
  f.allowFullscreen=true;
  f.allow='autoplay;fullscreen;encrypted-media;picture-in-picture';
  f.style.cssText='position:absolute;inset:0;width:100%;height:100%;border:none';
  f.onload=()=>{if(myToken===loadToken)showLoad(false)};
  $('pbox').appendChild(f);
  setTimeout(()=>{if(myToken===loadToken)showLoad(false)},7000);
}

// ── GENRE ──────────────────────────────────────────────────────────────────────
const GENRES=['Action','Adventure','Comedy','Drama','Ecchi','Fantasy','Harem','Historical','Horror','Isekai','Magic','Martial Arts','Mecha','Military','Music','Mystery','Psychological','Romance','School','Sci-Fi','Shounen','Shoujo','Slice of Life','Sports','Supernatural','Thriller'];

async function loadGenre(g){
  go('genre');
  $('gtitle').childNodes[$('gtitle').childNodes.length-1].textContent=' '+g;
  $('gpills').innerHTML=GENRES.map(x=>`<div class="pill${x===g?' act':''}" onclick="loadGenre('${x}')">${x}</div>`).join('');
  $('ggrid').innerHTML='<div style="color:var(--mu)">Loading…</div>';
  try{
    const r=await fetch(`/api/genre/${encodeURIComponent(g)}`);
    const d=await r.json();
    $('ggrid').innerHTML=(d.results||[]).map(card).join('')||'<div style="color:var(--mu)">No results.</div>';
  }catch(e){$('ggrid').innerHTML=`<div style="color:var(--hi)">Error: ${e.message}</div>`}

// ── SCHEDULE ──────────────────────────────────────────────────────────────────
const DAYS=['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
async function loadSched(){
  go('sched');
  const today=DAYS[new Date().getDay()===0?6:new Date().getDay()-1];
  $('day-tabs').innerHTML=DAYS.map(d=>`
    <button class="dtab${d===today?' act':''}" onclick="fetchSched('${d}');document.querySelectorAll('.dtab').forEach(b=>b.classList.remove('act'));this.classList.add('act')">${cap(d)}</button>`).join('');
  fetchSched(today);
}
async function fetchSched(day){
  $('sched-list').innerHTML='<div style="color:var(--mu)">Loading…</div>';
  try{
    const r=await fetch(`/api/schedule/${day}`);
    const d=await r.json();
    $('sched-list').innerHTML=(d.data||[]).length
      ?(d.data||[]).map(a=>`
        <div class="srow" onclick="goSeries(${a.mal_id})">
          <div class="stime">${a.broadcast?.time||'TBA'}</div>
          <div><div class="sname">${a.title||''}</div>
          <div style="font-size:11px;color:var(--mu)">${a.type||''} ${a.episodes?'· '+a.episodes+' eps':''}</div></div>
        </div>`).join('')
      :'<div style="color:var(--mu)">No data for this day.</div>';
  }catch(e){$('sched-list').innerHTML=`<div style="color:var(--hi)">Error: ${e.message}</div>`}
}

// ── SEARCH ──────────────────────────────────────────────────────────────────────
let stmr=null;
$('sinp').addEventListener('input',function(){
  clearTimeout(stmr);
  const q=this.value.trim();
  if(!q){$('sdrop').classList.remove('open');return}
  stmr=setTimeout(()=>doSearch(q),350);
});
document.addEventListener('click',e=>{if(!e.target.closest('.nav-search'))$('sdrop').classList.remove('open')});

async function doSearch(q){
  const drop=$('sdrop');
  drop.innerHTML='<div style="padding:12px;color:var(--mu);font-size:13px">Searching…</div>';
  drop.classList.add('open');
  try{
    const r=await fetch(`/api/search/${encodeURIComponent(q)}`);
    const d=await r.json();
    const items=d.results||[];
    if(!items.length){drop.innerHTML='<div style="padding:12px;color:var(--mu);font-size:13px">No results found.</div>';return}
    drop.innerHTML=items.slice(0,10).map(m=>{
      const t=ttl(m),s=sc(m),hasH=HINDI.has(m.id);
      return `<div class="si-item" onclick="goSeries(${m.id});$('sdrop').classList.remove('open');$('sinp').value=''">
        <img class="si-img" src="${img(m)}" onerror="this.style.background='var(--sf2)'"/>
        <div style="min-width:0">
          <div class="si-name">${t}</div>
          <div class="si-meta">
            ${m.format?`<span>${m.format}</span>`:''}
            ${m.seasonYear?`<span>${m.seasonYear}</span>`:''}
            ${s?`<span>⭐${s}</span>`:''}
            <span class="bdg b-jp" style="font-size:10px;padding:1px 5px">SUB</span>
            <span class="bdg b-bl" style="font-size:10px;padding:1px 5px">DUB</span>
            ${hasH?'<span class="bdg b-hi" style="font-size:10px;padding:1px 5px">हिं</span>':''}
          </div>
        </div>
      </div>`;
    }).join('');
  }catch(e){drop.innerHTML=`<div style="padding:12px;color:var(--hi);font-size:13px">Search failed</div>`}
}
